<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
<title>โหวตแบบเสื้อกีฬา HST</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ============== ตั้งค่า: วางลิงก์ Web App ที่ deploy แล้วตรงนี้ ============== */
  /* แก้ค่า API_URL ในแท็ก <script> ด้านล่างสุด */

  :root{
    --bg:#F5F5F7;
    --card:#FFFFFF;
    --text:#1D1D1F;
    --text-2:#6E6E73;
    --hairline:rgba(0,0,0,.08);
    --pink:#FF375F;
    --pink-soft:#FF6FA5;
    --blue:#0A84FF;
    --green:#34C759;
    --shadow:0 8px 30px rgba(0,0,0,.08);
    --shadow-press:0 2px 10px rgba(0,0,0,.10);
    --radius:20px;
    --radius-sm:14px;
    --accent:var(--pink);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  [data-theme="dark"]{
    --bg:#000000;
    --card:#1C1C1E;
    --text:#F5F5F7;
    --text-2:#98989D;
    --hairline:rgba(255,255,255,.12);
    --shadow:0 8px 30px rgba(0,0,0,.5);
    --shadow-press:0 2px 10px rgba(0,0,0,.6);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro","Helvetica Neue","IBM Plex Sans Thai",sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    padding-bottom:calc(76px + var(--safe-bottom));
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 16px;}

  /* ============== Header ============== */
  header.app{
    text-align:center;
    padding:28px 16px 8px;
  }
  header.app .logo{
    width:72px;height:72px;object-fit:contain;margin:0 auto 12px;display:block;
    border-radius:18px;
  }
  header.app .eyebrow{
    font-size:13px;font-weight:600;letter-spacing:.3px;
    color:var(--accent);text-transform:uppercase;margin:0 0 6px;
  }
  header.app h1{
    font-size:30px;font-weight:700;letter-spacing:-.5px;margin:0;
  }
  header.app p.sub{
    color:var(--text-2);font-size:15px;margin:6px 0 0;
  }

  /* ============== Views ============== */
  .view{display:none;animation:fade .35s ease-out;}
  .view.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* ============== Status banner ============== */
  .banner{
    border-radius:var(--radius-sm);
    padding:12px 16px;margin:8px 0 4px;
    font-size:14px;font-weight:500;display:flex;gap:8px;align-items:center;
  }
  .banner.open{background:rgba(52,199,89,.14);color:var(--green);}
  .banner.closed{background:rgba(255,55,95,.12);color:var(--pink);}
  .banner .dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex:none;}

  /* ============== Design cards ============== */
  .grid{display:flex;flex-direction:column;gap:14px;margin-top:14px;}
  .card{
    background:var(--card);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;
    border:2px solid transparent;
    transition:transform .22s ease-out,border-color .22s ease-out,box-shadow .22s ease-out;
    cursor:pointer;position:relative;
  }
  .card:active{transform:scale(.985);box-shadow:var(--shadow-press);}
  .card.selected{border-color:var(--accent);}
  .card .imgbox{
    width:100%;aspect-ratio:1/1;background:#e9e9ec;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  [data-theme="dark"] .card .imgbox{background:#2c2c2e;}
  .card .imgbox img{width:100%;height:100%;object-fit:cover;display:block;}
  .card .body{padding:14px 16px 16px;}
  .card .body .name{font-size:17px;font-weight:600;margin:0;}
  .card .body .desc{font-size:14px;color:var(--text-2);margin:4px 0 0;}
  .check{
    position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;
    background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;
    opacity:0;transform:scale(.6);transition:opacity .22s ease-out,transform .22s ease-out;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
  }
  .card.selected .check{opacity:1;transform:scale(1);}
  .check svg{width:17px;height:17px;}

  /* ============== Vote form ============== */
  .form{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:18px 16px;margin-top:18px;
  }
  .form label{display:block;font-size:14px;font-weight:600;margin:0 0 8px;}
  .form input.field{
    width:100%;font-size:18px;font-family:inherit;
    padding:14px 16px;border-radius:var(--radius-sm);
    border:1px solid var(--hairline);background:var(--bg);color:var(--text);
    outline:none;transition:border-color .2s ease-out,background .2s ease-out;
    text-align:center;
  }
  .form input.field:focus{border-color:var(--accent);background:var(--card);}
  .hint{font-size:12.5px;color:var(--text-2);margin:8px 2px 0;text-align:center;}

  .btn{
    width:100%;border:none;cursor:pointer;font-family:inherit;
    font-size:17px;font-weight:600;color:#fff;background:var(--accent);
    padding:15px;border-radius:999px;margin-top:16px;
    transition:transform .2s ease-out,opacity .2s ease-out,background .2s ease-out;
  }
  .btn:active{transform:scale(.97);opacity:.9;}
  .btn:disabled{opacity:.45;cursor:default;transform:none;}
  .btn.secondary{background:transparent;color:var(--accent);box-shadow:none;}

  /* ============== Toast / message ============== */
  .msg{margin-top:14px;border-radius:var(--radius-sm);padding:14px 16px;font-size:14.5px;font-weight:500;display:none;}
  .msg.show{display:block;animation:fade .3s ease-out;}
  .msg.ok{background:rgba(52,199,89,.14);color:var(--green);}
  .msg.err{background:rgba(255,55,95,.12);color:var(--pink);}

  /* ============== Success state ============== */
  .thanks{text-align:center;padding:40px 16px;}
  .thanks .circle{
    width:84px;height:84px;border-radius:50%;background:var(--green);
    display:flex;align-items:center;justify-content:center;margin:0 auto 18px;
    animation:pop .45s cubic-bezier(.2,.8,.2,1.2);
  }
  @keyframes pop{0%{transform:scale(0);}100%{transform:scale(1);}}
  .thanks .circle svg{width:42px;height:42px;color:#fff;}
  .thanks h2{font-size:24px;font-weight:700;margin:0 0 6px;}
  .thanks p{color:var(--text-2);margin:0;}

  /* ============== Results ============== */
  .results{margin-top:8px;display:flex;flex-direction:column;gap:14px;}
  .rrow{
    background:var(--card);border-radius:var(--radius-sm);box-shadow:var(--shadow);
    padding:14px 16px;
  }
  .rrow .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .rrow .rname{font-size:16px;font-weight:600;}
  .rrow .rpct{font-size:20px;font-weight:700;letter-spacing:-.3px;}
  .rrow .rcount{font-size:13px;color:var(--text-2);font-weight:500;}
  .track{
    height:12px;border-radius:999px;background:var(--hairline);margin-top:10px;overflow:hidden;
  }
  .fill{
    height:100%;border-radius:999px;width:0%;
    background:linear-gradient(90deg,var(--pink-soft),var(--blue));
    transition:width .8s cubic-bezier(.2,.8,.2,1);
  }
  .total-pill{
    text-align:center;color:var(--text-2);font-size:14px;font-weight:500;margin:6px 0 2px;
  }
  .leader .fill{background:linear-gradient(90deg,var(--pink),var(--pink-soft));}

  /* ============== Tab bar (iOS) ============== */
  .tabbar{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:rgba(255,255,255,.78);backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-top:1px solid var(--hairline);
    padding-bottom:var(--safe-bottom);
    display:flex;
  }
  [data-theme="dark"] .tabbar{background:rgba(28,28,30,.78);}

  /* ปุ่มสลับธีม สว่าง/มืด */
  .theme-toggle{
    position:fixed;top:14px;right:14px;z-index:60;
    width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;
    background:var(--card);color:var(--text);box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;
    transition:transform .2s ease-out,background .25s ease-out,color .25s ease-out;
  }
  .theme-toggle:active{transform:scale(.9);}
  .theme-toggle svg{width:21px;height:21px;}
  .theme-toggle .moon{display:none;}
  [data-theme="dark"] .theme-toggle .moon{display:block;}
  [data-theme="dark"] .theme-toggle .sun{display:none;}
  .tab{
    flex:1;background:none;border:none;cursor:pointer;font-family:inherit;
    padding:9px 0 8px;color:var(--text-2);display:flex;flex-direction:column;align-items:center;gap:3px;
    transition:color .2s ease-out;
  }
  .tab.active{color:var(--accent);}
  .tab svg{width:24px;height:24px;}
  .tab span{font-size:11px;font-weight:600;}

  footer.owner{text-align:center;padding:28px 16px 12px;color:var(--text-2);}
  footer.owner .logo-sm{width:40px;height:40px;object-fit:contain;border-radius:10px;margin:0 auto 8px;display:block;}
  footer.owner .org{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.4;}
  footer.owner .uni{font-size:12.5px;margin-top:2px;}
  footer.owner .admin-link{display:inline-block;margin-top:14px;font-size:12.5px;font-weight:600;
    color:var(--text-2);text-decoration:none;padding:7px 16px;border-radius:999px;
    border:1px solid var(--hairline);transition:color .2s,border-color .2s;}
  footer.owner .admin-link:active{color:var(--accent);border-color:var(--accent);}

  .center-muted{text-align:center;color:var(--text-2);padding:40px 16px;font-size:15px;}
  .spinner{
    width:26px;height:26px;border-radius:50%;border:3px solid var(--hairline);
    border-top-color:var(--accent);animation:spin .8s linear infinite;margin:30px auto;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
<script>
  /* ตั้งธีมก่อนวาดหน้า เพื่อไม่ให้จอกระพริบ */
  (function(){
    try{
      var t = localStorage.getItem('hst_theme');
      if(!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    }catch(e){ document.documentElement.setAttribute('data-theme','light'); }
  })();
  function toggleTheme(){
    var cur = document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', cur);
    try{ localStorage.setItem('hst_theme', cur); }catch(e){}
  }
</script>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="สลับธีมสว่าง/มืด" title="สลับธีมสว่าง/มืด">
  <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
</button>

<header class="app">
  <img class="logo" src="logo.png.jpg" alt="โลโก้สโมสรนักศึกษา" onerror="this.style.display='none'">
  <p class="eyebrow">HST Sports</p>
  <h1 id="appTitle">โหวตแบบเสื้อกีฬา</h1>
  <p class="sub">เลือกแบบที่ชอบที่สุด 1 แบบ</p>
</header>

<div class="wrap">

  <!-- ================= หน้าโหวต ================= -->
  <section id="voteView" class="view active">
    <div id="voteStatus"></div>
    <div id="voteContent">
      <div class="spinner"></div>
    </div>
  </section>

  <!-- ================= หน้าผลโหวต ================= -->
  <section id="resultView" class="view">
    <div class="total-pill" id="totalPill">กำลังโหลด…</div>
    <div class="results" id="resultsBox"></div>
  </section>

  <footer class="owner">
    <img class="logo-sm" src="logo.png.jpg" alt="" onerror="this.style.display='none'">
    <div class="org">สโมสรนักศึกษาคณะเทคโนโลยีวิทยาศาสตร์สุขภาพ</div>
    <div class="uni">ราชวิทยาลัยจุฬาภรณ์</div>
    <a class="admin-link" href="admin.html">สำหรับผู้ดูแลระบบ</a>
  </footer>

</div>

<!-- ================= Tab bar ================= -->
<nav class="tabbar">
  <button class="tab active" id="tabVote" onclick="switchView('vote')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <span>โหวต</span>
  </button>
  <button class="tab" id="tabResult" onclick="switchView('result')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>ผลโหวต</span>
  </button>
</nav>

<script>
/* ===================================================================
   ตั้งค่า: วางลิงก์ Web App ที่ deploy แล้ว (ลงท้ายด้วย /exec)
   =================================================================== */
var API_URL = "https://script.google.com/macros/s/AKfycbxCOQClzfur_p7f3T7mZZ6izH0VmUSAUjDNX6UgzLjbo0Rzb7B6N4b-qhUDsDnVTG0/exec";

/* ===================== Utilities ===================== */
function api(action, params){
  params = params || {};
  // อ่าน = GET, ส่งโหวต = POST (text/plain เลี่ยง CORS preflight)
  if(action === 'submitVote'){
    return fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(Object.assign({action:action}, params))
    }).then(function(r){return r.json();});
  }
  var qs = Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  }).join('&');
  var url = API_URL + '?action=' + action + (qs ? '&'+qs : '');
  return fetch(url).then(function(r){return r.json();});
}
function el(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

/* ===================== State ===================== */
var selectedDesign = null;
var designsCache = [];
var configCache = null;
var resultsTimer = null;

/* ===================== View switching ===================== */
function switchView(name){
  var vote = name === 'vote';
  el('voteView').classList.toggle('active', vote);
  el('resultView').classList.toggle('active', !vote);
  el('tabVote').classList.toggle('active', vote);
  el('tabResult').classList.toggle('active', !vote);
  el('appTitle').textContent = vote ? 'โหวตแบบเสื้อกีฬา' : 'ผลโหวตเรียลไทม์';
  if(vote){
    stopResultsPolling();
  }else{
    loadResults();
    startResultsPolling();
  }
}

/* ===================== หน้าโหวต ===================== */
function loadVotePage(){
  Promise.all([api('getConfig'), api('getDesigns')]).then(function(res){
    configCache = res[0];
    designsCache = (res[1] && res[1].designs) || [];
    renderVoteStatus();
    renderDesigns();
  }).catch(function(){
    el('voteContent').innerHTML =
      '<div class="center-muted">เชื่อมต่อระบบไม่สำเร็จ<br>กรุณาตรวจสอบลิงก์ API หรือลองใหม่</div>';
  });
}

function renderVoteStatus(){
  var box = el('voteStatus');
  if(configCache && configCache.is_open){
    box.innerHTML = '<div class="banner open"><span class="dot"></span>เปิดรับการโหวต</div>';
  }else{
    var note = 'ขณะนี้ปิดรับการโหวต';
    if(configCache){
      var now = configCache.server_time;
      if(configCache.voting_status === 'open' && configCache.open_time && now < configCache.open_time){
        note = 'ยังไม่ถึงเวลาเปิดโหวต';
      }else if(configCache.voting_status === 'open' && configCache.close_time && now > configCache.close_time){
        note = 'หมดเวลาโหวตแล้ว';
      }
    }
    box.innerHTML = '<div class="banner closed"><span class="dot"></span>'+esc(note)+'</div>';
  }
}

function renderDesigns(){
  if(!designsCache.length){
    el('voteContent').innerHTML = '<div class="center-muted">ยังไม่มีแบบเสื้อให้โหวต</div>';
    return;
  }
  var open = configCache && configCache.is_open;
  var html = '<div class="grid">';
  designsCache.forEach(function(d){
    html += '<div class="card" data-id="'+esc(d.design_id)+'" onclick="selectDesign(this)">'+
      '<div class="imgbox"><img loading="lazy" src="'+esc(d.image_url)+'" alt="'+esc(d.name)+'" onerror="this.style.display=\'none\'"></div>'+
      '<div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'+
      '<div class="body"><p class="name">'+esc(d.name)+'</p>'+
      (d.description?'<p class="desc">'+esc(d.description)+'</p>':'')+'</div>'+
    '</div>';
  });
  html += '</div>';

  // ฟอร์มกรอกรหัส
  html +=
    '<div class="form">'+
      '<label for="vname">ชื่อ-สกุล</label>'+
      '<input id="vname" class="field" type="text" maxlength="60" placeholder="เช่น สมชาย ใจดี" autocomplete="off">'+
      '<p class="hint">กรอกชื่อและนามสกุลจริง • 1 ชื่อโหวตได้ครั้งเดียว<br>ผลโหวตเป็นความลับ ไม่มีใครเห็นว่าคุณเลือกแบบใด</p>'+
      '<button class="btn" id="submitBtn" onclick="doSubmit()"'+(open?'':' disabled')+'>'+
        (open?'ส่งโหวต':'ปิดรับการโหวต')+'</button>'+
      '<div class="msg" id="voteMsg"></div>'+
    '</div>';

  el('voteContent').innerHTML = html;
}

function selectDesign(card){
  if(!(configCache && configCache.is_open)) return;
  var cards = document.querySelectorAll('#voteContent .card');
  cards.forEach(function(c){c.classList.remove('selected');});
  card.classList.add('selected');
  selectedDesign = card.getAttribute('data-id');
}

function showMsg(text, kind){
  var m = el('voteMsg');
  if(!m) return;
  m.textContent = text;
  m.className = 'msg show ' + (kind||'err');
}

function doSubmit(){
  var name = (el('vname').value || '').trim().replace(/\s+/g,' ');
  if(!selectedDesign){ showMsg('กรุณาเลือกแบบเสื้อก่อน','err'); return; }
  if(name.length < 4 || name.split(' ').length < 2 || /[0-9]/.test(name)){
    showMsg('กรุณากรอกชื่อ-สกุลให้ครบ (เช่น สมชาย ใจดี)','err'); return;
  }

  var btn = el('submitBtn');
  btn.disabled = true; btn.textContent = 'กำลังส่ง…';

  api('submitVote', {voter_name: name, design_id: selectedDesign}).then(function(res){
    if(res && res.ok){
      showSuccess();
    }else{
      showMsg((res && res.message) || 'เกิดข้อผิดพลาด ลองใหม่อีกครั้ง','err');
      btn.disabled = false; btn.textContent = 'ส่งโหวต';
    }
  }).catch(function(){
    showMsg('ส่งไม่สำเร็จ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่','err');
    btn.disabled = false; btn.textContent = 'ส่งโหวต';
  });
}

function showSuccess(){
  el('voteStatus').innerHTML = '';
  el('voteContent').innerHTML =
    '<div class="thanks">'+
      '<div class="circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'+
      '<h2>ขอบคุณที่ร่วมโหวต!</h2>'+
      '<p>บันทึกการโหวตของคุณเรียบร้อยแล้ว</p>'+
      '<button class="btn secondary" onclick="switchView(\'result\')">ดูผลโหวต</button>'+
    '</div>';
}

/* ===================== หน้าผลโหวต ===================== */
function loadResults(){
  api('getResults').then(function(res){
    if(!res || !res.ok){ el('totalPill').textContent='โหลดผลไม่สำเร็จ'; return; }
    var total = res.total || 0;
    el('totalPill').textContent = 'ผู้โหวตทั้งหมด ' + total.toLocaleString('th-TH') + ' คน';

    var sorted = res.results.slice().sort(function(a,b){return b.count-a.count;});
    var maxCount = sorted.length ? sorted[0].count : 0;
    var box = el('resultsBox');

    // สร้างแถวครั้งแรก / อัปเดตเฉพาะค่า เพื่อให้ animate ลื่น
    if(box.childElementCount !== sorted.length){
      box.innerHTML = sorted.map(function(r){
        return rowHtml(r, maxCount);
      }).join('');
    }else{
      sorted.forEach(function(r){
        var row = box.querySelector('[data-id="'+cssEsc(r.design_id)+'"]');
        if(row){ updateRow(row, r, maxCount); }
        else { box.innerHTML = sorted.map(function(x){return rowHtml(x,maxCount);}).join(''); }
      });
    }
  }).catch(function(){
    el('totalPill').textContent = 'โหลดผลไม่สำเร็จ';
  });
}
function cssEsc(s){return String(s).replace(/"/g,'\\"');}

function rowHtml(r, maxCount){
  var leader = (maxCount>0 && r.count===maxCount) ? ' leader' : '';
  return '<div class="rrow'+leader+'" data-id="'+esc(r.design_id)+'">'+
    '<div class="top"><span class="rname">'+esc(r.name)+'</span>'+
      '<span class="rpct">'+r.percent+'%</span></div>'+
    '<div class="rcount"><span class="cnt">'+r.count+'</span> โหวต</div>'+
    '<div class="track"><div class="fill" style="width:'+r.percent+'%"></div></div>'+
  '</div>';
}
function updateRow(row, r, maxCount){
  row.querySelector('.rpct').textContent = r.percent+'%';
  row.querySelector('.cnt').textContent = r.count;
  row.querySelector('.fill').style.width = r.percent+'%';
  var isLeader = (maxCount>0 && r.count===maxCount);
  row.classList.toggle('leader', isLeader);
}

function startResultsPolling(){
  stopResultsPolling();
  resultsTimer = setInterval(loadResults, 5000); // รีเฟรชทุก 5 วินาที
}
function stopResultsPolling(){
  if(resultsTimer){ clearInterval(resultsTimer); resultsTimer=null; }
}

/* ===================== Init ===================== */
loadVotePage();
</script>
